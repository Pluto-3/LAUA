ollama:
  base_url: "http://localhost:11434"
  default_model: "qwen3.5:4b"
  request_timeout: 60
  health_check_interval: 10

executor:
  command_timeout: 30
  max_agent_steps: 10
  dry_run: false

monitor:
  refresh_interval: 5
  poll_interval: 60
  cpu_alert_threshold: 90
  disk_alert_threshold: 90
  memory_alert_threshold: 90
  gpu_enabled: true
  thermal_enabled: true

memory:
  db_path: "~/.laua/laua.db"
  workflows_db_path: "~/.laua/workflows.db"
  max_history_tokens: 4096
  context_window_trigger: 0.80

permissions:
  restricted_paths:
    - /etc
    - /var
    - /usr
    - /boot
    - /sys
    - /proc
  require_confirmation:
    - delete
    - overwrite
    - kill
    - stop_service
    - install
    - remove_package
    - docker_container_stop
    - docker_container_remove
    - sudo

audit:
  log_path: "~/.laua/audit.db"

model_routing:
  fast: "llama3.2:3b"
  contextual: "qwen3.5:4b"
  reasoning: "qwen3.5:4b"
  coding: "qwen3.5:4b"
  fallback: "qwen3.5:2b"

file_manager:
  max_search_results: 50
  max_write_bytes: 10485760

ui:
  streaming: true
  show_plan: true
